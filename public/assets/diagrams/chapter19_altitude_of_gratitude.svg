<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 660 560" width="660" height="560"
     font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrowRedAlt" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#B23A48"/>
    </marker>
  </defs>

  <!-- High Altitude (outer band) -->
  <circle cx="230" cy="290" r="210" fill="#4A7BAD"/>
  <!-- Low Altitude (middle band) -->
  <circle cx="230" cy="290" r="125" fill="#2E5A87"/>
  <!-- Center: You -->
  <circle cx="230" cy="290" r="42" fill="#1E3D5C"/>

  <!-- Ring separators -->
  <circle cx="230" cy="290" r="210" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <circle cx="230" cy="290" r="125" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>

  <!-- High Altitude label -->
  <text x="230" y="112" text-anchor="middle" fill="white" font-size="18" font-weight="bold" letter-spacing="0.5">HIGH ALTITUDE</text>
  <text x="230" y="134" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="13">The wider world:</text>
  <text x="230" y="153" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="13">farmers, the planet, the moon</text>

  <!-- Low Altitude label -->
  <text x="230" y="196" text-anchor="middle" fill="white" font-size="17" font-weight="bold" letter-spacing="0.5">LOW ALTITUDE</text>
  <text x="230" y="217" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="12">What's directly yours:</text>
  <text x="230" y="235" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="12">food, people, circumstances</text>

  <!-- Center label -->
  <text x="230" y="297" text-anchor="middle" fill="white" font-size="17" font-weight="bold">YOU</text>

  <!-- Radiating arrows for Interpersonal Gratitude -->
  <line x1="275" y1="273.6" x2="448" y2="210.7" stroke="#B23A48" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowRedAlt)"/>
  <line x1="278" y1="290" x2="462" y2="290" stroke="#B23A48" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowRedAlt)"/>
  <line x1="275" y1="306.4" x2="448" y2="369.3" stroke="#B23A48" stroke-width="2.5" stroke-dasharray="6,5" marker-end="url(#arrowRedAlt)"/>

  <!-- Interpersonal Gratitude label -->
  <text x="480" y="255" fill="#B23A48" font-size="16" font-weight="bold" letter-spacing="0.3">INTERPERSONAL</text>
  <text x="480" y="275" fill="#B23A48" font-size="16" font-weight="bold" letter-spacing="0.3">GRATITUDE</text>
  <text x="480" y="300" fill="#B23A48" font-size="12" opacity="0.85">Felt from within —</text>
  <text x="480" y="318" fill="#B23A48" font-size="12" opacity="0.85">it radiates outward</text>
  <text x="480" y="336" fill="#B23A48" font-size="12" opacity="0.85">whether you say it or not</text>
</svg>
