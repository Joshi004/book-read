<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">

  <!-- Mindset 1: Succeeding (best) -->
  <rect x="40" y="20" width="520" height="80" rx="4" fill="#1E3D5C"/>

  <!-- Mindset 2: Lacking -->
  <rect x="40" y="112" width="520" height="80" rx="4" fill="#2E5A87"/>

  <!-- Mindset 3: Restricted -->
  <rect x="40" y="204" width="520" height="80" rx="4" fill="#C4536B"/>

  <!-- Mindset 4: Failing (worst) -->
  <rect x="40" y="296" width="520" height="80" rx="4" fill="#B23A48"/>

  <!-- Dividers -->
  <line x1="40" y1="100" x2="560" y2="100" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="40" y1="192" x2="560" y2="192" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="40" y1="284" x2="560" y2="284" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

  <!-- Outer outline -->
  <rect x="40" y="20" width="520" height="356" rx="4" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.5"/>

  <!-- Mindset 1 text -->
  <text x="300" y="44" text-anchor="middle" fill="white" font-size="15" font-weight="700">Mindset 1 — Succeeding</text>
  <text x="300" y="64" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">"I can do anything, and I have the tools I need to accomplish anything.</text>
  <text x="300" y="80" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">If I'm missing a tool, I will find it and succeed."</text>

  <!-- Mindset 2 text -->
  <text x="300" y="136" text-anchor="middle" fill="white" font-size="15" font-weight="700">Mindset 2 — Lacking</text>
  <text x="300" y="156" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">"I can do anything, but I don't have the tools and resources</text>
  <text x="300" y="172" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">that other people seem to have."</text>

  <!-- Mindset 3 text -->
  <text x="300" y="228" text-anchor="middle" fill="white" font-size="15" font-weight="700">Mindset 3 — Restricted</text>
  <text x="300" y="248" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">"Everything I want is accessible, but I'm not the kind of person</text>
  <text x="300" y="264" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">who can accomplish, earn, or achieve these kinds of things."</text>

  <!-- Mindset 4 text -->
  <text x="300" y="320" text-anchor="middle" fill="white" font-size="15" font-weight="700">Mindset 4 — Failing</text>
  <text x="300" y="340" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">"With no capability, and everyone else taking all the resources</text>
  <text x="300" y="356" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="10.5" font-style="italic">from the rest of us — there's nothing I can do."</text>

</svg>
