<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 480" width="680" height="480"
     font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">

  <!-- Triangle body -->
  <polygon points="340,90 52,435 628,435" fill="#EEE9DF"/>

  <!-- Triangle outline -->
  <polygon points="340,90 52,435 628,435" fill="none" stroke="#2E5A87" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- B vertex (top) — dark navy -->
  <circle cx="340" cy="90" r="36" fill="#1E3D5C"/>
  <text x="340" y="84" text-anchor="middle" fill="white" font-size="20" font-weight="700">B</text>
  <text x="340" y="102" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="9" letter-spacing="1.5">BEHAVIOR</text>

  <!-- E vertex (bottom-left) — accent blue -->
  <circle cx="52" cy="435" r="36" fill="#2E5A87"/>
  <text x="52" y="429" text-anchor="middle" fill="white" font-size="20" font-weight="700">E</text>
  <text x="52" y="447" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="9" letter-spacing="1.5">EFFECT</text>

  <!-- H vertex (bottom-right) — steel blue -->
  <circle cx="628" cy="435" r="36" fill="#4A7BAD"/>
  <text x="628" y="429" text-anchor="middle" fill="white" font-size="20" font-weight="700">H</text>
  <text x="628" y="447" text-anchor="middle" fill="rgba(255,255,255,0.82)" font-size="9" letter-spacing="1.5">HABITS</text>

  <!-- B descriptor — above circle -->
  <text x="340" y="16" text-anchor="middle" fill="#1E3D5C" font-size="10" font-weight="700">Internal Traits of the Operator</text>
  <text x="340" y="32" text-anchor="middle" fill="#5B5B5B" font-size="9">Confidence · Discipline · Leadership · Gratitude · Enjoyment</text>

  <!-- Center label -->
  <text x="340" y="220" text-anchor="middle" fill="#1E3D5C" font-size="14" font-weight="700" letter-spacing="1.5">THE AUTHORITY TRIANGLE</text>
  <line x1="225" y1="232" x2="455" y2="232" stroke="#2E5A87" stroke-width="1" opacity="0.35"/>
  <text x="340" y="252" text-anchor="middle" fill="#5B5B5B" font-size="10.5">Centerpiece of influence and persuasion capacity</text>

  <!-- E qualities — lower-left inside triangle -->
  <text x="185" y="348" text-anchor="middle" fill="#1A1A1A" font-size="9.5" font-weight="600">Effects on Subject</text>
  <text x="185" y="363" text-anchor="middle" fill="#5B5B5B" font-size="8.5">Movement · Appearance</text>
  <text x="185" y="377" text-anchor="middle" fill="#5B5B5B" font-size="8.5">Confidence · Connection · Intent</text>

  <!-- H qualities — lower-right inside triangle -->
  <text x="495" y="348" text-anchor="middle" fill="#1A1A1A" font-size="9.5" font-weight="600">Operator Habits</text>
  <text x="495" y="363" text-anchor="middle" fill="#5B5B5B" font-size="8.5">Environment · Time · Appearance</text>
  <text x="495" y="377" text-anchor="middle" fill="#5B5B5B" font-size="8.5">Social · Financial</text>

  <!-- Left-side edge label (B→E: external representation of authority) -->
  <text transform="translate(158,265) rotate(-51)" text-anchor="middle" fill="#2E5A87" font-size="8" font-style="italic" opacity="0.75">External representation of authority</text>

  <!-- Right-side edge label (B→H: lifestyle habits affecting authority) -->
  <text transform="translate(522,265) rotate(51)" text-anchor="middle" fill="#4A7BAD" font-size="8" font-style="italic" opacity="0.75">Lifestyle habits shaping authority</text>

  <!-- Bottom edge label (E→H: unconscious tripwires) -->
  <text x="340" y="462" text-anchor="middle" fill="#5B5B5B" font-size="8" font-style="italic" opacity="0.8">E side: unconscious tripwires that activate ancestral authority scripts</text>

</svg>
