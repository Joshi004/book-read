<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" width="600" height="375" font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">

  <!-- Layer 1: Physiological (bottom) -->
  <polygon points="86,287 514,287 560,355 40,355" fill="#B23A48"/>

  <!-- Layer 2: Safety -->
  <polygon points="132,219 468,219 514,287 86,287" fill="#C4536B"/>

  <!-- Layer 3: Belonging -->
  <polygon points="178,151 422,151 468,219 132,219" fill="#4A7BAD"/>

  <!-- Layer 4: Esteem -->
  <polygon points="224,83 376,83 422,151 178,151" fill="#2E5A87"/>

  <!-- Layer 5: Self-Actualization (top) -->
  <polygon points="270,15 330,15 376,83 224,83" fill="#1E3D5C"/>

  <!-- Subtle dividers between layers -->
  <line x1="86"  y1="287" x2="514" y2="287" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="132" y1="219" x2="468" y2="219" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="178" y1="151" x2="422" y2="151" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="224" y1="83"  x2="376" y2="83"  stroke="white" stroke-width="1" opacity="0.25"/>

  <!-- Outer pyramid outline — visible on both light and dark backgrounds -->
  <polygon points="270,15 330,15 560,355 40,355" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Self-Actualization label (layer center y=49) -->
  <text x="300" y="46" text-anchor="middle" fill="white" font-size="9.5" font-weight="700">Self-Actualization</text>
  <text x="300" y="59" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="8">Achieving individual potential</text>

  <!-- Esteem label (layer center y=117) -->
  <text x="300" y="111" text-anchor="middle" fill="white" font-size="13" font-weight="700">Esteem</text>
  <text x="300" y="127" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="10">Self-respect and respect from others</text>

  <!-- Belonging label (layer center y=185) -->
  <text x="300" y="179" text-anchor="middle" fill="white" font-size="14" font-weight="700">Belonging</text>
  <text x="300" y="196" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="10">Group membership, love, affection</text>

  <!-- Safety label (layer center y=253) -->
  <text x="300" y="247" text-anchor="middle" fill="white" font-size="14" font-weight="700">Safety</text>
  <text x="300" y="264" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="10">Shelter, clothes, removal from danger</text>

  <!-- Physiological label (layer center y=321) -->
  <text x="300" y="315" text-anchor="middle" fill="white" font-size="14" font-weight="700">Physiological</text>
  <text x="300" y="332" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="10">Health, food, sleep</text>

</svg>
