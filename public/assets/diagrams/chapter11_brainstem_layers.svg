<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 510" width="600" height="510"
     font-family="'Avenir Next','Helvetica Neue',Arial,sans-serif">

  <!-- Root: spinal cord -->
  <polygon points="280,480 320,480 350,400 250,400" fill="#5B5B5B" opacity="0.55" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Medulla Oblongata (bottom of brain stem) — most vital, involuntary -->
  <polygon points="250,400 350,400 385,310 215,310" fill="#B23A48" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Pons (bridge) -->
  <polygon points="215,310 385,310 425,210 175,210" fill="#C4536B" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Midbrain (top of brain stem) -->
  <polygon points="175,210 425,210 470,105 130,105" fill="#4A7BAD" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Transition to cerebrum ("the flower") -->
  <polygon points="130,105 470,105 575,35 25,35" fill="#2E5A87" opacity="0.9" stroke="rgba(0,0,0,0.12)" stroke-width="1"/>

  <!-- Dividers -->
  <line x1="250" y1="400" x2="350" y2="400" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="215" y1="310" x2="385" y2="310" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="175" y1="210" x2="425" y2="210" stroke="white" stroke-width="1" opacity="0.3"/>
  <line x1="130" y1="105" x2="470" y2="105" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Labels: Cerebrum (the flower) -->
  <text x="300" y="62" text-anchor="middle" fill="white" font-size="13" font-weight="700">Cerebrum — "the flower"</text>
  <text x="300" y="80" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="9">Reasoning, language, voluntary movement</text>

  <!-- Labels: Midbrain -->
  <text x="300" y="167" text-anchor="middle" fill="white" font-size="12.5" font-weight="700">Midbrain</text>
  <text x="300" y="184" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="9">Vision, hearing, eye movement</text>
  <text x="300" y="196" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="9">Motivation &amp; reward — houses the VTA</text>

  <!-- Labels: Pons -->
  <text x="300" y="272" text-anchor="middle" fill="white" font-size="12" font-weight="700">Pons</text>
  <text x="300" y="288" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="8.5">Bridge to the cerebrum</text>
  <text x="300" y="300" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="8.5">Eye &amp; facial nerves, saliva</text>

  <!-- Labels: Medulla Oblongata -->
  <text x="300" y="362" text-anchor="middle" fill="white" font-size="11" font-weight="700">Medulla Oblongata</text>
  <text x="300" y="378" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="8">Breathing, heart rate</text>
  <text x="300" y="390" text-anchor="middle" fill="rgba(255,255,255,0.78)" font-size="8">digestion, reflexes</text>

  <!-- Annotations -->
  <text x="300" y="16" text-anchor="middle" fill="#5B5B5B" font-size="8" font-style="italic" letter-spacing="0.5">▲ CONSCIOUS, VOLUNTARY</text>
  <text x="300" y="500" text-anchor="middle" fill="#5B5B5B" font-size="8" font-style="italic" letter-spacing="0.5">Spinal Cord — "the root"</text>

</svg>
