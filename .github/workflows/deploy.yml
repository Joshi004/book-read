name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; cancel in-progress if a new push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Install, build, smoke-test, then upload the artifact.
  # The Pages artifact is NOT uploaded until the smoke test passes — this gates the deploy.
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: npm run preview &

      - name: Wait for preview server
        run: npx --yes wait-on http://localhost:4173/book-read/ --timeout 30000

      - name: Smoke test
        run: |
          RESPONSE=$(curl --fail --silent --show-error http://localhost:4173/book-read/)
          echo "$RESPONSE" | grep -q "Behavior Ops" \
            || { echo "Smoke test failed: 'Behavior Ops' not found in response"; exit 1; }
          echo "Smoke test passed."

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Live at: [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY
